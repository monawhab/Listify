name: Listify Auto Bug-Fix Loop

on:
  repository_dispatch:
    types: [crashlytics_alert]
  workflow_dispatch:
    inputs:
      crash_title:
        description: 'Crash title / exception class'
        required: true
        default: 'NullPointerException in ProductListFragment'
      crash_stack_trace:
        description: 'Stack trace'
        required: true
        default: 'java.lang.NullPointerException at com.listify.presentation.productlist.ProductListFragment.setupAdapters(ProductListFragment.kt:45)'
      affected_version:
        description: 'App version affected'
        required: false
        default: '1.0.1'

jobs:
  triage-and-fix:
    name: Triage Crash and Generate Fix
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract crash details
        id: crash
        run: |
          TITLE="${{ github.event.inputs.crash_title || github.event.client_payload.crash_title }}"
          VERSION="${{ github.event.inputs.affected_version || github.event.client_payload.version }}"
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          TRACE="${{ github.event.inputs.crash_stack_trace || github.event.client_payload.stack_trace }}"
          echo "$TRACE" > /tmp/stack_trace.txt

      - name: Create Jira Bug Ticket
        id: jira
        run: python3 .github/scripts/create_jira_ticket.py
        env:
          JIRA_API_TOKEN_B64: ${{ secrets.JIRA_API_TOKEN_B64 }}
          CRASH_TITLE: ${{ steps.crash.outputs.title }}
          CRASH_VERSION: ${{ steps.crash.outputs.version }}
        continue-on-error: true

      - name: Analyze crash
        run: python3 .github/scripts/crash_analyzer.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CRASH_TITLE: ${{ steps.crash.outputs.title }}
        continue-on-error: true

      - name: Open fix PR
        run: python3 .github/scripts/open_fix_pr.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JIRA_TICKET: ${{ steps.jira.outputs.ticket }}
          CRASH_TITLE: ${{ steps.crash.outputs.title }}
        continue-on-error: true

      - name: Update Jira with PR link
        run: |
          PR_URL=$(cat /tmp/pr_url.txt 2>/dev/null || echo "PR creation failed")
          TICKET="${{ steps.jira.outputs.ticket }}"
          if [ -n "$TICKET" ] && [ "$TICKET" != "LIS-AUTO" ]; then
            curl -s -X POST \
              -H "Authorization: Basic ${{ secrets.JIRA_API_TOKEN_B64 }}" \
              -H "Content-Type: application/json" \
              "https://androiddevteam.atlassian.net/rest/api/3/issue/$TICKET/comment" \
              -d "{\"body\":{\"type\":\"doc\",\"version\":1,\"content\":[{\"type\":\"paragraph\",\"content\":[{\"type\":\"text\",\"text\":\"Auto-fix PR: $PR_URL\"}]}]}}"
          fi
        continue-on-error: true

      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "Auto Bug-Fix triggered for ${{ steps.crash.outputs.title }}",
              "attachments": [{
                "color": "warning",
                "fields": [
                  { "title": "Ticket", "value": "${{ steps.jira.outputs.ticket }}", "short": true },
                  { "title": "Version", "value": "${{ steps.crash.outputs.version }}", "short": true }
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
        continue-on-error: true
