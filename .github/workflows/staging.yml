name: Listify Staging — Deploy to Firebase

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Staging release notes'
        required: false
        default: 'Staging build from develop branch'

jobs:
  staging-deploy:
    name: Build & Deploy Staging
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest

      - name: Build Staging APK
        run: ./gradlew assembleStagingRelease
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > ${{ github.workspace }}/listify_listify@2024.jks

      - name: Upload Staging APK
        uses: actions/upload-artifact@v4
        with:
          name: listify-staging-${{ github.sha }}
          path: app/build/outputs/apk/staging/*.apk
          retention-days: 14

      - name: Deploy to Firebase App Distribution (staging)
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID_STAGING }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: staging-testers
          file: app/build/outputs/apk/staging/app-staging-release.apk
          releaseNotes: |
            STAGING BUILD — ${{ github.event.inputs.release_notes || format('From {0} commit {1}', github.ref_name, github.sha) }}

      - name: Comment on PR with staging link
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🧪 Staging Build Ready\nDeployed to Firebase App Distribution — *staging-testers* group.\nCommit: \`${context.sha.substring(0,7)}\``
            });

      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "🧪 *Listify staging — ${{ job.status }}*",
              "attachments": [{
                "color": "${{ job.status == 'success' && 'warning' || 'danger' }}",
                "fields": [
                  { "title": "Branch", "value": "${{ github.ref_name }}", "short": true },
                  { "title": "Triggered by", "value": "${{ github.actor }}", "short": true }
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
