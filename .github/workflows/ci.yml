name: Listify CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    name: Build, Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Lint (capture report)
        run: ./gradlew lint || true

      - name: Upload Lint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report-${{ github.sha }}
          path: app/build/reports/lint-results-debug.xml
          retention-days: 1

      - name: Fail if lint errors found
        run: |
          if grep -q 'severity="Error"' app/build/reports/lint-results-debug.xml 2>/dev/null; then
            echo "LINT ERRORS:"
            grep -A5 'severity="Error"' app/build/reports/lint-results-debug.xml | head -60
            exit 1
          else
            echo "Lint clean ✅"
          fi

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: listify-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.sha }}
          path: app/build/reports/tests/
          retention-days: 7
