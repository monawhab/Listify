name: Listify CD — Deploy to Firebase

on:
  workflow_run:
    workflows: ["Listify CI"]
    branches: [ main ]
    types: [ completed ]
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Release notes for this build'
        required: false
        default: 'Manual deployment from main branch'

jobs:
  deploy:
    name: Build, Sign & Deploy
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > listify_listify@2024.jks

      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}

      - name: Locate and prepare APK
        id: apk
        run: |
          echo "APK files in release directory:"
          find app/build/outputs/apk/release -name "*.apk" -type f
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" -type f | head -1)
          echo "APK_PATH=$APK_PATH" >> $GITHUB_OUTPUT
          echo "Using: $APK_PATH"

      - name: Sign APK (if unsigned)
        run: |
          APK="${{ steps.apk.outputs.APK_PATH }}"
          if [[ "$APK" == *"unsigned"* ]]; then
            echo "Signing unsigned APK..."
            jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
              -keystore listify_listify@2024.jks \
              -storepass "${{ secrets.STORE_PASSWORD }}" \
              -keypass "${{ secrets.KEY_PASSWORD }}" \
              "$APK" "${{ secrets.KEY_ALIAS }}"
            SIGNED="${APK/unsigned/signed}"
            zipalign -v -p 4 "$APK" "$SIGNED" 2>/dev/null || cp "$APK" "$SIGNED"
            cp "$SIGNED" app/build/outputs/apk/release/app-final.apk
          else
            echo "APK already signed by Gradle."
            cp "$APK" app/build/outputs/apk/release/app-final.apk
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: listify-release-${{ github.sha }}
          path: app/build/outputs/apk/release/app-final.apk
          retention-days: 30

      - name: Deploy to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: internal-testers
          file: app/build/outputs/apk/release/app-final.apk
          releaseNotes: ${{ github.event.inputs.release_notes || 'Auto-deploy from main' }}

      - name: Get version info
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}-${{ github.run_number }}
          name: Listify v${{ steps.version.outputs.version }} (Build ${{ github.run_number }})
          body: |
            Listify v${{ steps.version.outputs.version }} — Build ${{ github.run_number }}
            Commit ${{ github.sha }}
            Deployed to Firebase App Distribution internal-testers group.
          files: app/build/outputs/apk/release/app-final.apk
          draft: false
          prerelease: false

      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "${{ job.status == 'success' && '✅' || '❌' }} *Listify CD — ${{ job.status }}* (Build ${{ github.run_number }})",
              "attachments": [{
                "color": "${{ job.status == 'success' && 'good' || 'danger' }}",
                "fields": [
                  { "title": "Version", "value": "v${{ steps.version.outputs.version }}", "short": true },
                  { "title": "Actor", "value": "${{ github.actor }}", "short": true },
                  { "title": "Logs", "value": "<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View>", "short": false }
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
