name: Listify CD — Deploy to Firebase

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Release notes for this build'
        required: false
        default: 'Automated deployment from main branch'

jobs:
  deploy:
    name: Build, Sign & Deploy
    runs-on: ubuntu-latest
    # Only run if CI checks have passed
    needs: []

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── Run tests first ──────────────────────────────────────────────────────
      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest

      # ── Build release APK ────────────────────────────────────────────────────
      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}

      # ── Sign APK (if keystore secret exists) ─────────────────────────────────
      - name: Decode Keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > ${{ github.workspace }}/listify_listify@2024.jks

      - name: Sign APK
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        uses: r0adkll/sign-android-release@v1
        id: sign_apk
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      # ── Upload APK artifact ──────────────────────────────────────────────────
      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: listify-release-${{ github.sha }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      # ── Deploy to Firebase App Distribution ──────────────────────────────────
      - name: Deploy to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: internal-testers
          file: app/build/outputs/apk/release/app-release.apk
          releaseNotes: |
            ${{ github.event.inputs.release_notes || format('Build from commit {0} by {1}', github.sha, github.actor) }}
            
            Commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}
            Triggered by: ${{ github.actor }}

      # ── Create GitHub Release tag ────────────────────────────────────────────
      - name: Get version from build.gradle
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          BUILD=$(grep 'versionCode' app/build.gradle.kts | sed 's/[^0-9]//g')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build=$BUILD" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}-${{ github.run_number }}
          name: Listify v${{ steps.version.outputs.version }} (Build ${{ github.run_number }})
          body: |
            ## Listify Release
            
            **Version:** ${{ steps.version.outputs.version }}
            **Build:** ${{ github.run_number }}
            **Commit:** ${{ github.sha }}
            
            ### Changes
            ${{ github.event.inputs.release_notes || 'Automated release from main branch' }}
            
            ### Distribution
            Deployed to Firebase App Distribution → internal-testers group
          files: app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false

      # ── Slack notification ───────────────────────────────────────────────────
      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "✅ *Listify deployed successfully!*",
              "attachments": [
                {
                  "color": "good",
                  "fields": [
                    { "title": "Version", "value": "v${{ steps.version.outputs.version }} (Build ${{ github.run_number }})", "short": true },
                    { "title": "Triggered by", "value": "${{ github.actor }}", "short": true },
                    { "title": "Commit", "value": "<https://github.com/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>" , "short": false },
                    { "title": "Firebase", "value": "Deployed to *internal-testers* group", "short": false }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "❌ *Listify CD pipeline FAILED*",
              "attachments": [
                {
                  "color": "danger",
                  "fields": [
                    { "title": "Branch", "value": "${{ github.ref_name }}", "short": true },
                    { "title": "Triggered by", "value": "${{ github.actor }}", "short": true },
                    { "title": "Logs", "value": "<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>", "short": false }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
