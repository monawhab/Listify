name: Listify CD — Deploy to Firebase

on:
  workflow_run:
    workflows: ["Listify CI"]
    branches: [ main ]
    types: [ completed ]
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Release notes'
        required: false
        default: 'Manual deployment'

jobs:
  deploy:
    name: Build, Sign & Deploy
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > listify_listify@2024.jks

      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}

      - name: Locate APK and sign if needed
        id: apk
        run: |
          find app/build/outputs/apk/release -name "*.apk"
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          if [[ "$APK" == *"unsigned"* ]]; then
            jarsigner -sigalg SHA256withRSA -digestalg SHA-256 \
              -keystore listify_listify@2024.jks \
              -storepass "${{ secrets.STORE_PASSWORD }}" \
              -keypass "${{ secrets.KEY_PASSWORD }}" \
              "$APK" "${{ secrets.KEY_ALIAS }}"
            cp "$APK" app/build/outputs/apk/release/app-final.apk
          else
            cp "$APK" app/build/outputs/apk/release/app-final.apk
          fi
          echo "apk_path=app/build/outputs/apk/release/app-final.apk" >> $GITHUB_OUTPUT

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: listify-release-${{ github.sha }}
          path: app/build/outputs/apk/release/app-final.apk
          retention-days: 30

      - name: Deploy to Firebase App Distribution
        continue-on-error: true
        env:
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          RELEASE_NOTES: ${{ github.event.inputs.release_notes || 'Auto-deploy from main' }}
        run: |
          npm install -g firebase-tools --silent
          echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json
          firebase appdistribution:distribute app/build/outputs/apk/release/app-final.apk             --app "$FIREBASE_APP_ID"             --groups "internal-testers"             --release-notes "$RELEASE_NOTES"             --project listify-24177             --debug 2>&1 | tail -30 || echo "Firebase deploy failed — check Firebase Console: App Distribution must be initialized and internal-testers group must exist"

      - name: Get version
        id: version
        run: |
          V=$(grep 'versionName' app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$V" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}-${{ github.run_number }}
          name: Listify v${{ steps.version.outputs.version }} (Build ${{ github.run_number }})
          body: |
            Version ${{ steps.version.outputs.version }} — Build ${{ github.run_number }}
            Commit ${{ github.sha }}
          files: app/build/outputs/apk/release/app-final.apk
          draft: false
          prerelease: false

      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "${{ job.status == 'success' && '✅' || '❌' }} *Listify CD — ${{ job.status }}* (Build ${{ github.run_number }})",
              "attachments": [{"color": "${{ job.status == 'success' && 'good' || 'danger' }}", "fields": [{"title": "Version", "value": "v${{ steps.version.outputs.version }}", "short": true}, {"title": "Actor", "value": "${{ github.actor }}", "short": true}]}]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
